<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Reset Password | MrYoungFargo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a0a2e, #0a1a3a);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .reset-container {
      background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
      border-radius: 20px;
      padding: 35px 25px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    h1 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, #7f2aeb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    p {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 25px;
    }
    
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    
    input:focus {
      border-color: #3b82f6;
    }
    
    button {
      background: #3b82f6;
      border: none;
      color: white;
      padding: 14px;
      width: 100%;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #2563eb;
      transform: scale(0.98);
    }
    
    .message {
      margin-top: 15px;
      font-size: 0.75rem;
      padding: 10px;
      border-radius: 8px;
    }
    
    .message.success {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }
    
    .message.error {
      background: rgba(225, 29, 44, 0.2);
      color: #e11d2c;
    }
    
    .back-link {
      margin-top: 20px;
      display: block;
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.75rem;
    }
    
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <h1>Create New Password</h1>
    <p id="statusText">Enter your new password below</p>
    
    <input type="password" id="newPassword" placeholder="New password">
    <input type="password" id="confirmPassword" placeholder="Confirm password">
    
    <button id="resetBtn">RESET PASSWORD</button>
    
    <a href="https://mryoungfargo.github.io/Duets-merch-store/" class="back-link">← Back to store</a>
    
    <div id="messageDiv" class="message" style="display: none;"></div>
  </div>

  <script>
    // Get token and email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');
    
    const statusText = document.getElementById('statusText');
    const resetBtn = document.getElementById('resetBtn');
    const messageDiv = document.getElementById('messageDiv');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    
    // Validate token and email presence
    if (!token || !email) {
      statusText.innerHTML = '❌ Invalid or expired reset link';
      statusText.style.color = '#e11d2c';
      resetBtn.disabled = true;
      resetBtn.style.opacity = '0.5';
    }
    
    resetBtn.addEventListener('click', async () => {
      const newPassword = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();
      
      messageDiv.style.display = 'none';
      
      if (!newPassword || !confirmPassword) {
        showMessage('Please fill in both password fields', 'error');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }
      
      if (newPassword.length < 4) {
        showMessage('Password must be at least 4 characters', 'error');
        return;
      }
      
      resetBtn.innerText = '⏳ RESETTING...';
      resetBtn.disabled = true;
      
      try {
        // First, verify the token with backend
        const verifyResponse = await fetch('https://mryoungfargo-payment.onrender.com/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword })
        });
        
        const verifyData = await verifyResponse.json();
        
        if (verifyData.success) {
          // Now update the password in localStorage
          let users = JSON.parse(localStorage.getItem('app_users')) || [];
          const userIndex = users.findIndex(u => u.email === email);
          
          if (userIndex !== -1) {
            users[userIndex].password = newPassword;
            localStorage.setItem('app_users', JSON.stringify(users));
            showMessage('✅ Password reset successfully! Redirecting to login...', 'success');
            
            setTimeout(() => {
              window.location.href = 'https://mryoungfargo.github.io/Duets-merch-store/';
            }, 2000);
          } else {
            showMessage('Account not found. Please create a new account.', 'error');
            setTimeout(() => {
              window.location.href = 'https://mryoungfargo.github.io/Duets-merch-store/';
            }, 2000);
          }
        } else {
          showMessage(verifyData.error || 'Invalid or expired reset link', 'error');
          resetBtn.innerText = 'RESET PASSWORD';
          resetBtn.disabled = false;
        }
      } catch (error) {
        showMessage('Connection error. Please try again.', 'error');
        resetBtn.innerText = 'RESET PASSWORD';
        resetBtn.disabled = false;
      }
    });
    
    function showMessage(msg, type) {
      messageDiv.innerText = msg;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
    }
  </script>
</body>
</html>
